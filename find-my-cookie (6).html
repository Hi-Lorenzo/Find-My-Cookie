<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Find My Cookie 🍪</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    /* ── CSS VARIABLES ── */
    :root {
      --cream:#FFF8F0; --beige:#F5E6D3; --caramel:#C4722A; --golden:#E8A838;
      --text-1:#2A1200; --text-2:#6B4E37; --text-3:#9A7B6A;
      --card:#FFFFFF; --surface:#FFFFFF; --bg:#FFF8F0;
      --border:rgba(196,114,42,.18);
      --sh-sm:0 1px 4px rgba(61,28,2,.07);
      --sh-md:0 4px 14px rgba(61,28,2,.11);
      --sh-lg:0 10px 36px rgba(61,28,2,.16);
      --r:16px; --r-sm:10px;
      --ease:all .25s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"] {
      --cream:#1A0F06; --beige:#261508; --caramel:#E8A838; --golden:#C4722A;
      --text-1:#FFF0E0; --text-2:#D4A574; --text-3:#7A6050;
      --card:#261508; --surface:#2A1A0A; --bg:#1A0F06;
      --border:rgba(232,168,56,.14);
      --sh-sm:0 1px 4px rgba(0,0,0,.32);
      --sh-md:0 4px 14px rgba(0,0,0,.42);
      --sh-lg:0 10px 36px rgba(0,0,0,.60);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
    h1,h2,h3{font-family:'Playfair Display',Georgia,serif}
    a{text-decoration:none}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .page-home{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);z-index:10;transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .45s ease;}
    .page-home.hidden{transform:scale(.95) translateX(-8%);opacity:0;pointer-events:none}
    .page-map{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);z-index:5;transition:transform .45s cubic-bezier(.4,0,.2,1);}
    .page-map.hidden{transform:translateX(100%);pointer-events:none}
    .home-wrap{position:relative;overflow:hidden}
    .home-mesh{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 15% 20%,rgba(232,168,56,.10) 0%,transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(196,114,42,.09) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(212,165,116,.05) 0%,transparent 70%);}
    .home-floats{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
    .fc{position:absolute;opacity:.07;animation:fc-rise linear infinite;animation-fill-mode:backwards;}
    @keyframes fc-rise{from{transform:translateY(105vh) rotate(0deg)}to{transform:translateY(-10vh) rotate(360deg)}}
    .hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:64px 24px 48px;min-height:72vh;justify-content:center;}
    .cookie-badge{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--golden),var(--caramel));display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:24px;box-shadow:0 8px 32px rgba(196,114,42,.4),0 0 0 8px rgba(196,114,42,.1);animation:pulse 3s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 8px 32px rgba(196,114,42,.4),0 0 0 8px rgba(196,114,42,.1)}50%{transform:scale(1.06);box-shadow:0 12px 40px rgba(196,114,42,.5),0 0 0 14px rgba(196,114,42,.07)}}
    .hero-title{font-size:clamp(38px,9vw,60px);font-weight:900;line-height:1.05;letter-spacing:-.02em;margin-bottom:10px}
    .hero-title span{background:linear-gradient(135deg,var(--caramel),var(--golden));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero-tag{font-size:clamp(16px,3.5vw,20px);color:var(--text-2);font-style:italic;font-family:'Playfair Display',serif;margin-bottom:36px}
    .cta-btn{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--caramel),var(--golden));color:#fff;font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;padding:18px 44px;border-radius:100px;border:none;cursor:pointer;box-shadow:0 4px 24px rgba(196,114,42,.42);transition:var(--ease);letter-spacing:.01em;}
    .cta-btn:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(196,114,42,.52)}
    .cta-btn:active{transform:translateY(0)}
    .hero-stats{display:flex;gap:36px;margin-top:40px;flex-wrap:wrap;justify-content:center}
    .stat{text-align:center}
    .stat-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--caramel)}
    .stat-lbl{font-size:13px;color:var(--text-3);margin-top:2px}
    .scroll-hint{position:relative;z-index:1;text-align:center;padding-bottom:20px;color:var(--text-3);font-size:13px;animation:bob 1.8s ease-in-out infinite}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
    .reviews-section{position:relative;z-index:1;padding:0 0 64px}
    .reviews-hdg{text-align:center;padding:0 24px 24px}
    .reviews-hdg h2{font-size:clamp(22px,5vw,30px);margin-bottom:6px}
    .reviews-hdg p{font-size:14px;color:var(--text-3)}
    .reviews-track{display:flex;overflow:hidden;padding:6px 0 16px;-webkit-mask:linear-gradient(90deg,transparent,black 8%,black 92%,transparent);mask:linear-gradient(90deg,transparent,black 8%,black 92%,transparent);}
    .reviews-track:hover .reviews-inner{animation-play-state:paused}
    .reviews-inner{display:flex;gap:16px;flex-shrink:0;animation:marquee 60s linear infinite;}
    @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .r-card{flex:0 0 272px;background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--sh-md);border:1px solid var(--border);}
    .r-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .r-avi{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .r-name{font-weight:600;font-size:13px;color:var(--text-1)}
    .r-stars{color:#E8A838;font-size:12px;margin-top:1px}
    .r-text{font-size:13px;color:var(--text-2);line-height:1.5}
    .app-hdr{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--sh-sm);z-index:100;padding:12px 14px 8px;flex-shrink:0;}
    .hdr-top{display:flex;align-items:center;gap:9px;margin-bottom:9px}
    .hdr-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--caramel);flex:1}
    .ico-btn{width:34px;height:34px;border-radius:50%;background:var(--beige);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:var(--ease);flex-shrink:0;color:var(--text-2);}
    .ico-btn:hover{background:var(--border);transform:scale(1.06)}
    .searchbar{display:flex;align-items:center;gap:7px;background:var(--beige);border-radius:100px;padding:8px 13px;border:1.5px solid var(--border);transition:var(--ease);}
    .searchbar:focus-within{border-color:var(--caramel);background:var(--surface);box-shadow:0 0 0 3px rgba(196,114,42,.1)}
    .searchbar input{background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-1);flex:1;min-width:0;}
    .searchbar input::placeholder{color:var(--text-3)}
    .filter-bar{display:flex;gap:7px;overflow-x:auto;padding:8px 0 4px;scrollbar-width:none}
    .filter-bar::-webkit-scrollbar{display:none}
    .chip{flex:0 0 auto;padding:6px 13px;border-radius:100px;border:1.5px solid var(--border);background:var(--beige);color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;transition:var(--ease);white-space:nowrap;font-family:'DM Sans',sans-serif;}
    .chip:hover{border-color:var(--caramel);color:var(--caramel)}
    .chip.on{background:linear-gradient(135deg,var(--caramel),var(--golden));border-color:transparent;color:#fff}
    .hdr-bot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:7px}
    .res-count{font-size:12px;color:var(--text-3);flex-shrink:0}
    .res-count strong{color:var(--caramel)}
    .view-tog{display:flex;background:var(--beige);border-radius:100px;padding:3px;border:1px solid var(--border)}
    .tog-btn{padding:4px 12px;border-radius:100px;border:none;background:none;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-3);transition:var(--ease);font-family:'DM Sans',sans-serif;}
    .tog-btn.on{background:var(--surface);color:var(--caramel);box-shadow:var(--sh-sm)}
    .map-wrap{flex:1;position:relative;overflow:hidden}
    #leaflet-map{width:100%;height:100%}
    .loc-btn{position:absolute;bottom:90px;right:14px;z-index:500;width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border);box-shadow:var(--sh-md);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:var(--ease);}
    .loc-btn:hover{transform:scale(1.06)}
    .loading-ov{position:absolute;inset:0;z-index:999;background:rgba(255,248,240,.82);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
    [data-theme="dark"] .loading-ov{background:rgba(26,15,6,.85)}
    .spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--caramel);border-radius:50%;animation:spin .75s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-txt{font-size:13px;color:var(--text-2)}
    .err-banner{position:absolute;bottom:14px;left:14px;right:14px;z-index:600;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--text-2);box-shadow:var(--sh-md);display:flex;align-items:center;gap:8px;}
    .ck-marker{background:none;border:none}
    .ck-inner{filter:drop-shadow(0 2px 5px rgba(0,0,0,.4));animation:mk-drop .3s cubic-bezier(.36,.07,.19,.97) backwards}
    @keyframes mk-drop{from{transform:translateY(-18px);opacity:0}to{transform:translateY(0);opacity:1}}
    .marker-cluster-small{background-color:rgba(196,114,42,.35)}
    .marker-cluster-small div{background-color:rgba(196,114,42,.9);color:#fff}
    .marker-cluster-medium{background-color:rgba(232,168,56,.35)}
    .marker-cluster-medium div{background-color:rgba(232,168,56,.9);color:#fff}
    .marker-cluster-large{background-color:rgba(61,28,2,.35)}
    [data-theme="dark"] .marker-cluster-small{background-color:rgba(80,45,10,.45)}
    [data-theme="dark"] .marker-cluster-small div{background-color:rgba(90,52,18,.95);color:#e8c99a}
    [data-theme="dark"] .marker-cluster-medium{background-color:rgba(80,45,10,.45)}
    [data-theme="dark"] .marker-cluster-medium div{background-color:rgba(90,52,18,.95);color:#e8c99a}
    [data-theme="dark"] .marker-cluster-large{background-color:rgba(60,30,5,.45)}
    [data-theme="dark"] .marker-cluster-large div{background-color:rgba(70,38,10,.95);color:#e8c99a}
    .marker-cluster-large div{background-color:rgba(61,28,2,.9);color:#fff}
    .marker-cluster div{font-family:'DM Sans',sans-serif;font-weight:700}
    .leaflet-popup-content-wrapper{border-radius:12px!important;font-family:'DM Sans',sans-serif!important;box-shadow:var(--sh-lg)!important}
    .list-view{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:9px}
    .l-item{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:var(--r-sm);padding:13px;box-shadow:var(--sh-sm);border:1px solid var(--border);cursor:pointer;transition:var(--ease);}
    .l-item:hover{border-color:var(--caramel);box-shadow:var(--sh-md);transform:translateY(-1px)}
    .l-ico{width:42px;height:42px;border-radius:var(--r-sm);flex-shrink:0;background:linear-gradient(135deg,rgba(232,168,56,.14),rgba(196,114,42,.14));display:flex;align-items:center;justify-content:center;font-size:20px;}
    .l-info{flex:1;min-width:0}
    .l-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
    .l-addr{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .l-meta{display:flex;align-items:center;gap:7px;margin-top:3px}
    .badge{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500;display:inline-block}
    .badge-type{background:rgba(196,114,42,.11);color:var(--caramel)}
    .badge-rat{background:rgba(232,168,56,.11);color:#b07a10}
    [data-theme="dark"] .badge-rat{color:var(--golden)}
    .l-dist{font-size:12px;color:var(--text-3);flex-shrink:0}
    .fav-btn{background:none;border:none;cursor:pointer;font-size:17px;flex-shrink:0;padding:2px;transition:var(--ease)}
    .fav-btn:hover{transform:scale(1.25)}
    .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:600;animation:fade-in .2s ease}
    @keyframes fade-in{from{opacity:0}to{opacity:1}}
    .sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:22px 22px 0 0;padding:0 20px 34px;z-index:700;box-shadow:0 -8px 40px rgba(0,0,0,.18);animation:slide-up .35s cubic-bezier(.32,.72,0,1);max-height:80vh;overflow-y:auto;}
    @keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sheet-handle{width:38px;height:4px;background:var(--border);border-radius:100px;margin:12px auto 18px}
    .sheet-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
    .sheet-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;flex:1;margin-right:10px}
    .sheet-close{width:30px;height:30px;border-radius:50%;background:var(--beige);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-2);flex-shrink:0;transition:var(--ease);}
    .sheet-close:hover{background:var(--border)}
    .sheet-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
    .sheet-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:11px;font-size:14px;color:var(--text-2)}
    .sheet-row-ico{font-size:15px;flex-shrink:0;margin-top:1px}
    .sheet-row-txt{flex:1}
    .sheet-row-txt a{color:var(--caramel)}
    .sheet-row-txt a:hover{text-decoration:underline}
    .sheet-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:18px}
    .s-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;text-decoration:none;transition:var(--ease);}
    .s-btn-p{background:linear-gradient(135deg,var(--caramel),var(--golden));color:#fff;box-shadow:0 2px 10px rgba(196,114,42,.28)}
    .s-btn-p:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(196,114,42,.4)}
    .s-btn-s{background:var(--beige);color:var(--text-2);border:1px solid var(--border)}
    .s-btn-s:hover{border-color:var(--caramel);color:var(--caramel)}
    .s-fav-btn{grid-column:1/-1;background:none;border:1.5px dashed var(--border);color:var(--text-3);padding:10px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:var(--ease);}
    .s-fav-btn.on{background:rgba(232,168,56,.09);border:1.5px solid var(--golden);color:var(--golden)}
    .s-fav-btn:hover{border-color:var(--golden);color:var(--golden)}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;gap:10px}
    .empty-ico{font-size:48px;opacity:.4}
    .empty-ttl{font-family:'Playfair Display',serif;font-size:20px;color:var(--text-2)}
    .empty-txt{font-size:14px;color:var(--text-3);line-height:1.6}
    .store-reviews{margin-top:16px;border-top:1px solid var(--border);padding-top:14px;}
    .store-reviews-hdg{font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .sr-card{background:var(--beige);border-radius:var(--r-sm);padding:12px;margin-bottom:8px;border:1px solid var(--border);}
    .sr-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .sr-avi{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .sr-name{font-size:12px;font-weight:600;color:var(--text-1);}
    .sr-stars{font-size:11px;color:#E8A838;}
    .sr-text{font-size:12px;color:var(--text-2);line-height:1.5;font-style:italic;}

    .home-footer{position:relative;z-index:1;text-align:center;padding:12px 24px 28px;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;}
    .home-footer a, .home-footer span{font-size:11px;color:var(--text-3);cursor:pointer;transition:var(--ease);}
    .home-footer a:hover{color:var(--caramel);text-decoration:underline;}
    .home-footer .footer-sep{font-size:10px;color:var(--border);}

    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;animation:fade-in .2s ease;display:flex;align-items:flex-end;}
    .modal{background:var(--surface);border-radius:22px 22px 0 0;padding:0 20px 40px;width:100%;max-height:85vh;overflow-y:auto;animation:slide-up .35s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(0,0,0,.2);}
    .modal-handle{width:38px;height:4px;background:var(--border);border-radius:100px;margin:12px auto 18px}
    .modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}
    .modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text-1);}
    .modal-close{width:30px;height:30px;border-radius:50%;background:var(--beige);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-2);transition:var(--ease);}
    .modal-close:hover{background:var(--border)}
    .modal-body{font-size:13px;color:var(--text-2);line-height:1.7;}
    .modal-body h3{font-family:'Playfair Display',serif;font-size:15px;color:var(--text-1);margin:16px 0 6px;}
    .modal-body p{margin-bottom:10px;}
    .modal-badge{display:inline-block;background:linear-gradient(135deg,var(--caramel),var(--golden));color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;margin-bottom:14px;}


    /* ── SURPRISE ME ── */
    .surprise-btn{position:absolute;bottom:148px;right:14px;z-index:500;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--caramel),var(--golden));border:none;box-shadow:var(--sh-md);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:var(--ease);}
    .surprise-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(196,114,42,.5)}


    /* ── TOAST ── */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text-1);color:var(--bg);font-size:13px;font-weight:500;padding:10px 20px;border-radius:100px;z-index:900;white-space:nowrap;animation:toast-in .3s ease;box-shadow:var(--sh-lg);}
    @keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}


    /* ── SEARCH SUGGESTIONS ── */
    .suggest-wrap{position:relative;}
    .suggest-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:var(--sh-lg);z-index:200;overflow:hidden;max-height:220px;overflow-y:auto;}
    .suggest-item{padding:10px 14px;font-size:13px;color:var(--text-1);cursor:pointer;display:flex;align-items:center;gap:8px;transition:var(--ease);}
    .suggest-item:hover{background:var(--beige);}
    .suggest-item span{color:var(--text-3);font-size:11px;}

    /* ── OPEN / CLOSED BADGE ── */
    .badge-open{background:rgba(46,160,67,.13);color:#1a7f37;}
    .badge-closed{background:rgba(207,34,46,.11);color:#b91c1c;}

function fmtWalk(km){
  const mins=Math.round((km/5)*60);
  if(mins<1)return'<1 min walk';
  if(mins<60)return mins+' min walk';
  return Math.round(mins/60)+'h walk';
}

function isOpenNow(openHrs){
  if(!openHrs)return null;
  try{
    const now=new Date();
    const day=['Su','Mo','Tu','We','Th','Fr','Sa'][now.getDay()];
    const cur=now.getHours()*60+now.getMinutes();
    const parts=openHrs.split(';');
    for(const part of parts){
      const p=part.trim();
      if(!p.includes(day))continue;
      const m=p.match(/(\d{2}):(\d{2})-(\d{2}):(\d{2})/);
      if(!m)continue;
      const open=parseInt(m[1])*60+parseInt(m[2]);
      const close=parseInt(m[3])*60+parseInt(m[4]);
      return cur>=open&&cur<close;
    }
    return null;
  }catch(e){return null;}
}

function seededRng(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}
function hashStr(str){let h=0;for(let i=0;i<str.length;i++)h=(Math.imul(31,h)+str.charCodeAt(i))|0;return Math.abs(h);}
function pick(rng,arr){return arr[Math.floor(rng()*arr.length)];}
function buildReview(rng,usedNames,usedMids,usedOpens,usedCloses){
  const stars=pick(rng,[5,5,5,4,4,4,4,3,3,2]);
  let name,attempts=0;
  do{name=pick(rng,RV.firstNames)+' '+pick(rng,RV.lastInits)+'.';attempts++;}while(usedNames.has(name)&&attempts<30);
  usedNames.add(name);
  let mid,ma=0;
  do{mid=pick(rng,RV.mids);ma++;}while(usedMids.has(mid)&&ma<30);
  usedMids.add(mid);
  const opens=stars===5?RV.open5:stars===4?RV.open4:stars===3?RV.open3:RV.open2;
  const closes=stars===5?RV.close5:stars===4?RV.close4:stars===3?RV.close3:RV.close2;
  let open,oa=0;do{open=pick(rng,opens);oa++;}while(usedOpens.has(open)&&oa<20);usedOpens.add(open);
  let close,ca=0;do{close=pick(rng,closes);ca++;}while(usedCloses.has(close)&&ca<20);usedCloses.add(close);
  return{stars,name,avi:pick(rng,RV.avis),bg:pick(rng,RV.bgs),txt:open+' '+mid+' '+close};
}
function getStoreReviews(loc){
  const rng=seededRng(hashStr(loc.id+loc.name+loc.address));
  const count=2+Math.floor(rng()*4);
  const usedNames=new Set(),usedMids=new Set(),usedOpens=new Set(),usedCloses=new Set();
  return Array.from({length:count},()=>buildReview(rng,usedNames,usedMids,usedOpens,usedCloses));
}

function kmBetween(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function fmtKm(km){return km<1?`${Math.round(km*1000)}m`:`${km.toFixed(1)}km`;}

function parseOSM(el){
  const lat=el.lat??el.center?.lat;const lon=el.lon??el.center?.lon;
  if(!lat||!lon)return null;const t=el.tags||{};if(!t.name)return null;
  const num=t['addr:housenumber']||'';const str=t['addr:street']||'';const city=t['addr:city']||'Edinburgh';
  const addr=num&&str?`${num} ${str}, ${city}`:str?`${str}, ${city}`:city;
  return{id:`osm-${el.type}-${el.id}`,name:t.name,address:addr,lat,lng:lon,type:t.shop||t.amenity||'place',phone:t.phone||t['contact:phone']||null,website:t.website||t['contact:website']||null,openHrs:t.opening_hours||null,src:'osm'};
}

async function fetchOverpass(){
  const q=`[out:json][timeout:25];(node["shop"="bakery"](${BBOX});node["shop"="confectionery"](${BBOX});node["shop"="pastry"](${BBOX});node["amenity"="cafe"]["name"~"cookie|cookies|bake|bakery|dessert|sweet|patisserie|pastry|biscuit",i](${BBOX});node["amenity"="fast_food"]["name"~"cookie|cookies|bakery|bake",i](${BBOX});way["shop"="bakery"](${BBOX});way["shop"="confectionery"](${BBOX});way["amenity"="cafe"]["name"~"cookie|cookies|bake|bakery|dessert|patisserie|pastry",i](${BBOX}););out center;`;
  const res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`data=${encodeURIComponent(q)}`});
  if(!res.ok)throw new Error(`Overpass HTTP ${res.status}`);
  const json=await res.json();return(json.elements||[]).map(parseOSM).filter(Boolean);
}

function mergeLocations(fallback,live){
  const out=[...fallback];
  for(const loc of live){const dup=out.some(e=>kmBetween(e.lat,e.lng,loc.lat,loc.lng)<0.05);if(!dup)out.push(loc);}
  return out;
}

function AnimatedCounter({target}){
  const [count,setCount]=useState(0);
  useEffect(()=>{
    if(target===0)return;
    const step=Math.ceil(target/40);
    const t=setInterval(()=>{
      setCount(c=>{
        if(c+step>=target){clearInterval(t);return target;}
        return c+step;
      });
    },30);
    return()=>clearInterval(t);
  },[target]);
  return React.createElement(React.Fragment,null,count);
}

          <p>Supermarket sweep. Tesco, Sainsbury's, Lidl, Aldi, Asda and Waitrose branches all added to the fallback data. Filter system introduced with Top Rated, Closest, Bakery, Dessert and Favourites tabs. List view added alongside the map. Bottom sheet redesigned with store details, directions links and save-to-favourites.</p>

          <h3>v1.0 — The Beginning</h3>
          <p>It started with a simple question: where are the cookies? Ben's Cookies, Chulo's and Millie's Cookies were the founding three. The map worked. The cookies were found. History was made.</p>

          <h3>What's Next</h3>
          <p>Version 1.5 is in the works. We cannot say much, but we can say it involves cookies. It always involves cookies.</p>

          <p style={{marginTop:'18px',fontStyle:'italic',color:'var(--text-3)'}}>Find My Cookie is built with love in Edinburgh. Thank you for using it. 🍪</p>
        </div>
      </div>
    </div>
  );
}

function HomePage({onEnter}){
  const [showTerms,setShowTerms]=useState(false);
  const [showVersion,setShowVersion]=useState(false);
  const floats=useRef(Array.from({length:16},()=>({left:`${Math.random()*100}%`,delay:`${Math.random()*10}s`,dur:`${8+Math.random()*9}s`,size:`${16+Math.random()*18}px`}))).current;
  return(
    <div className="home-wrap">
      <div className="home-mesh"/>
      <div className="home-floats">{floats.map((c,i)=><div key={i} className="fc" style={{left:c.left,fontSize:c.size,animationDuration:c.dur,animationDelay:c.delay}}>🍪</div>)}</div>
      <div className="hero">
        <div className="cookie-badge">🍪</div>
        <h1 className="hero-title">Find My <span>Cookie</span></h1>
        <p className="hero-tag">The best app for cookie lovers</p>
        <button className="cta-btn" onClick={onEnter}><span>🗺️</span> Find Cookies Near Me</button>

      </div>
      <div className="home-counter"><strong><AnimatedCounter target={128}/></strong> cookie spots mapped across Edinburgh</div>
      <div className="scroll-hint">Scroll for reviews ↓</div>
      <div className="reviews-section">
        <div className="reviews-hdg"><h2>Cookie Lovers Approve 🍪</h2><p>Trusted by Edinburgh's most dedicated cookie hunters</p></div>
        <div className="reviews-track">
          <div className="reviews-inner">{[...REVIEWS,...REVIEWS].map((r,i)=><ReviewCard key={i} r={r}/>)}</div>
        </div>
      </div>
      {showTerms&&<TermsModal onClose={()=>setShowTerms(false)}/>}
      {showVersion&&<VersionModal onClose={()=>setShowVersion(false)}/>}
      <div className="home-footer">
        <a href="#" onClick={e=>{e.preventDefault();setShowTerms(true);}}>Terms of Service</a>
        <span className="footer-sep">@</span>
        <a href="#" onClick={e=>{e.preventDefault();setShowVersion(true);}}>Version</a>
      </div>
    </div>
  );
}

function StoreReviews({loc}){
  const revs=getStoreReviews(loc);
  return(
    <div className="store-reviews">
      <div className="store-reviews-hdg">⭐ What people are saying</div>
      {revs.map((r,i)=>(
        <div key={i} className="sr-card">
          <div className="sr-head"><div className="sr-avi" style={{background:r.bg}}>{r.avi}</div><div><div className="sr-name">{r.name}</div><div className="sr-stars">{'★'.repeat(r.stars)}{'☆'.repeat(5-r.stars)}</div></div></div>
          <p className="sr-text">"{r.txt}"</p>
        </div>
      ))}
    </div>
  );
}

function LocationSheet({loc,favs,onFav,onClose,onShare,onReport}){
  if(!loc)return null;
  const saved=favs.has(loc.id);
  const gmUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.name+' '+loc.address)}`;
  const osmUrl=`https://www.openstreetmap.org/?mlat=${loc.lat}&mlon=${loc.lng}&zoom=17`;
  return(
    <div>
      <div className="sheet-backdrop" onClick={onClose}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div className="sheet-hdr"><h2 className="sheet-title">{loc.name}</h2><button className="sheet-close" onClick={onClose}>✕</button></div>
        <div className="sheet-tags">
          <span className="badge badge-type">{tIcon(loc.type)} {tLabel(loc.type)}</span>
          {loc.rating&&<span className="badge badge-rat">★ {loc.rating.toFixed(1)}</span>}
          {loc.src==='fallback'&&<span className="badge" style={{background:'rgba(196,114,42,.08)',color:'#8A6040'}}>✓ Verified</span>}
          {isOpenNow(loc.openHrs)===true&&<span className="badge badge-open">🟢 Open Now</span>}
          {isOpenNow(loc.openHrs)===false&&<span className="badge badge-closed">🔴 Closed</span>}
        </div>
        <div className="sheet-row"><span className="sheet-row-ico">📍</span><span className="sheet-row-txt">{loc.address}</span></div>
        {loc.phone&&<div className="sheet-row"><span className="sheet-row-ico">📞</span><span className="sheet-row-txt"><a href={`tel:${loc.phone}`}>{loc.phone}</a></span></div>}
        {loc.website&&<div className="sheet-row"><span className="sheet-row-ico">🌐</span><span className="sheet-row-txt"><a href={loc.website} target="_blank" rel="noopener noreferrer">{loc.website.replace(/^https?:\/\//,'').replace(/\/$/,'')}</a></span></div>}
        {loc.openHrs&&<div className="sheet-row"><span className="sheet-row-ico">🕐</span><span className="sheet-row-txt">{loc.openHrs}</span></div>}
        {!loc.phone&&!loc.website&&!loc.openHrs&&<div className="sheet-row"><span className="sheet-row-ico">ℹ️</span><span className="sheet-row-txt" style={{color:'var(--text-3)',fontStyle:'italic',fontSize:'13px'}}>Additional details may be limited — use the links below for more info</span></div>}
        <StoreReviews loc={loc}/>
        <div className="sheet-btns">
          <a className="s-btn s-btn-p" href={gmUrl} target="_blank" rel="noopener noreferrer">🗺️ Google Maps</a>
          <a className="s-btn s-btn-s" href={osmUrl} target="_blank" rel="noopener noreferrer">🌍 OpenStreetMap</a>
          <button className={`s-fav-btn${saved?' on':''}`} onClick={()=>onFav(loc.id)}>{saved?'❤️ Saved to Favourites':'🤍 Save to Favourites'}</button>
          <button className="s-fav-btn" style={{borderStyle:'solid'}} onClick={onShare}>📤 Share this shop</button>
          <button className="s-fav-btn" style={{borderStyle:'solid',borderColor:'rgba(200,80,80,.3)',color:'#c05050'}} onClick={onReport}>⚠️ Report closed / moved</button>
        </div>
      </div>
    </div>
  );
}

function ListItem({loc,userLoc,favs,onSelect,onFav}){
  const km=userLoc?kmBetween(userLoc.lat,userLoc.lng,loc.lat,loc.lng):null;
  const saved=favs.has(loc.id);
  return(
    <div className="l-item" onClick={()=>onSelect(loc)}>
      <div className="l-ico">{tIcon(loc.type)}</div>
      <div className="l-info"><div className="l-name">{loc.name}</div><div className="l-addr">{loc.address}</div><div className="l-meta"><span className="badge badge-type">{tLabel(loc.type)}</span>{loc.rating&&<span className="badge badge-rat">★ {loc.rating.toFixed(1)}</span>}</div></div>
      {km!==null&&<div className="l-dist" style={{textAlign:'right'}}>
      <div>{fmtKm(km)}</div>
      <div className="walk-time">{fmtWalk(km)}</div>
    </div>}
      <button className="fav-btn" onClick={e=>{e.stopPropagation();onFav(loc.id);}}>{saved?'❤️':'🤍'}</button>
    </div>
  );
}

function MapView({locs,onSelect,userLoc,active,dark}){
  const divRef=useRef(null),mapRef=useRef(null),clusterRef=useRef(null),userMkRef=useRef(null),tileRef=useRef(null);
  const LIGHT='https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  const DARK='https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
  const ATTR='© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>';

  useEffect(()=>{
    if(!divRef.current||mapRef.current)return;
    const map=L.map(divRef.current,{center:CENTRE,zoom:13,zoomControl:true});
    const tl=L.tileLayer(LIGHT,{attribution:ATTR,maxZoom:19}).addTo(map);
    tileRef.current=tl;
    const cluster=L.markerClusterGroup({iconCreateFunction:c=>{const n=c.getChildCount();const sz=n<10?'small':n<30?'medium':'large';return L.divIcon({html:`<div><span>${n}</span></div>`,className:`marker-cluster marker-cluster-${sz}`,iconSize:L.point(40,40)});},maxClusterRadius:56,spiderfyOnMaxZoom:true,showCoverageOnHover:false});
    map.addLayer(cluster);mapRef.current=map;clusterRef.current=cluster;
    return()=>{map.remove();mapRef.current=null;clusterRef.current=null;};
  },[]);

  useEffect(()=>{if(active&&mapRef.current)setTimeout(()=>mapRef.current.invalidateSize(),120);},[active]);

  useEffect(()=>{
    const map=mapRef.current,tl=tileRef.current;if(!map||!tl)return;
    map.removeLayer(tl);
    const newTl=L.tileLayer(dark?DARK:LIGHT,{attribution:ATTR,maxZoom:19}).addTo(map);
    tileRef.current=newTl;
  },[dark]);

  useEffect(()=>{
    const cl=clusterRef.current;if(!cl)return;cl.clearLayers();
    const icon=L.divIcon({html:`<div class="ck-inner" style="font-size:26px;line-height:1">🍪</div>`,className:'ck-marker',iconSize:[30,34],iconAnchor:[15,34],popupAnchor:[0,-34]});
    locs.forEach(loc=>{const mk=L.marker([loc.lat,loc.lng],{icon});mk.bindTooltip(loc.name,{direction:'top',offset:[0,-30],opacity:.95});mk.on('click',()=>onSelect(loc));cl.addLayer(mk);});
  },[locs,onSelect]);

  useEffect(()=>{
    const map=mapRef.current;if(!map)return;
    if(userMkRef.current){userMkRef.current.remove();userMkRef.current=null;}
    if(userLoc){const icon=L.divIcon({html:`<div style="width:13px;height:13px;background:#4F7FFF;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 5px rgba(79,127,255,.28)"></div>`,className:'',iconSize:[13,13],iconAnchor:[6,6]});userMkRef.current=L.marker([userLoc.lat,userLoc.lng],{icon}).addTo(map);map.flyTo([userLoc.lat,userLoc.lng],14,{duration:1.4});}
  },[userLoc]);

  return <div ref={divRef} id="leaflet-map"/>;
}

function App(){
  const [page,setPage]=useState('home');
  const [locs,setLocs]=useState(FALLBACK);
  const [sel,setSel]=useState(null);
  const [view,setView]=useState('map');
  const [query,setQuery]=useState('');
  const [filter,setFilter]=useState('all');
  const [userLoc,setUserLoc]=useState(null);
  const [favs,setFavs]=useState(new Set());
  const [dark,setDark]=useState(false);
  const [loading,setLoading]=useState(false);
  const [loaded,setLoaded]=useState(false);
  const [errMsg,setErrMsg]=useState(null);
  const [suggestions,setSuggestions]=useState([]);
  const [showSug,setShowSug]=useState(false);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',dark?'dark':'light');},[dark]);

  const fetchLive=useCallback(()=>{
    setLoading(true);setErrMsg(null);
    fetchOverpass().then(live=>{setLocs(mergeLocations(FALLBACK,live));setLoaded(true);}).catch(()=>setErrMsg('Live data unavailable — showing saved locations')).finally(()=>setLoading(false));
  },[]);

  useEffect(()=>{if(page!=='map'||loaded)return;fetchLive();},[page,loaded]);

  const getLocation=useCallback(()=>{
    if(!navigator.geolocation)return alert('Geolocation not supported by your browser.');
    navigator.geolocation.getCurrentPosition(pos=>setUserLoc({lat:pos.coords.latitude,lng:pos.coords.longitude}),()=>alert('Could not get your location — check browser permissions.'));
  },[]);

  const toggleFav=useCallback(id=>{setFavs(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});},[]);

  const surpriseMe=useCallback(()=>{
    if(!visible.length) return;
    setSel(visible[Math.floor(Math.random()*visible.length)]);
  },[visible]);


  const visible=useMemo(()=>{
    let res=[...locs];
    if(query){const q=query.toLowerCase();res=res.filter(l=>l.name.toLowerCase().includes(q)||l.address.toLowerCase().includes(q));}
    if(filter==='bakery')res=res.filter(l=>l.type==='bakery');
    if(filter==='dessert')res=res.filter(l=>['confectionery','dessert','cafe','fast_food'].includes(l.type));
    if(filter==='favourites')res=res.filter(l=>favs.has(l.id));
    if(filter==='open_now')res=res.filter(l=>isOpenNow(l.openHrs)===true);
    if(filter==='closest'&&userLoc)res.sort((a,b)=>kmBetween(userLoc.lat,userLoc.lng,a.lat,a.lng)-kmBetween(userLoc.lat,userLoc.lng,b.lat,b.lng));
    if(filter==='rating')res.sort((a,b)=>(b.rating||0)-(a.rating||0));
    return res;
  },[locs,query,filter,userLoc,favs]);

  const mapActive=page==='map'&&view==='map';

  return(
    <div>
      <div className={`page-home${page==='map'?' hidden':''}`}><HomePage onEnter={()=>setPage('map')}/></div>
      <div className={`page-map${page==='home'?' hidden':''}`}>
        <div className="app-hdr">
          <div className="hdr-top">
            <button className="ico-btn" onClick={()=>setPage('home')} title="Home">←</button>
            <span className="hdr-logo">🍪 Find My Cookie</span>
            <button className="ico-btn" onClick={()=>setDark(d=>!d)} title="Toggle dark mode">{dark?'☀️':'🌙'}</button>
          </div>
          <div className="suggest-wrap">
          <div className="searchbar">
            <span style={{color:'var(--text-3)',fontSize:'14px'}}>🔍</span>
            <input type="text" placeholder="Search Old Town, Leith, Stockbridge…" value={query} onChange={e=>{
              const v=e.target.value;
              setQuery(v);
              if(v.length>1){
                const q=v.toLowerCase();
                const matches=locs.filter(l=>l.name.toLowerCase().includes(q)||l.address.toLowerCase().includes(q)).slice(0,6);
                setSuggestions(matches);
                setShowSug(matches.length>0);
              } else {
                setShowSug(false);
              }
            }}
            onFocus={()=>{if(suggestions.length>0)setShowSug(true);}}
            onBlur={()=>setTimeout(()=>setShowSug(false),150)}/>
            {query&&<button onClick={()=>{setQuery('');setShowSug(false);}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:'14px'}}>✕</button>}
          </div>
          {showSug&&(
            <div className="suggest-drop">
              {suggestions.map((s,i)=>(
                <div key={i} className="suggest-item" onMouseDown={()=>{setQuery(s.name);setShowSug(false);setSel(s);setView('map');}}>
                  {tIcon(s.type)} {s.name} <span>{s.address.split(',')[0]}</span>
                </div>
              ))}
            </div>
          )}
          </div>
          <div className="filter-bar">
            {FILTERS.map(f=>(
              <button key={f.id} className={`chip${filter===f.id?' on':''}`} onClick={()=>{setFilter(f.id);if(f.id==='closest'&&!userLoc)getLocation();}}>{f.label}</button>
            ))}
          </div>
          <div className="hdr-bot">
            <span className="res-count"><strong>{visible.length}</strong> cookie {visible.length===1?'spot':'spots'}{loaded&&' · Live ✓'}{errMsg&&<span style={{color:'var(--caramel)'}}> · {errMsg}</span>}</span>
            <div className="view-tog">
              <button className={`tog-btn${view==='map'?' on':''}`} onClick={()=>setView('map')}>🗺 Map</button>
              <button className={`tog-btn${view==='list'?' on':''}`} onClick={()=>setView('list')}>☰ List</button>
            </div>
          </div>
        </div>
        {view==='map'&&(
          <div className="map-wrap">
            <MapView locs={visible} onSelect={setSel} userLoc={userLoc} active={mapActive} dark={dark}/>
            {loading&&<div className="loading-ov"><div className="spinner"/><span className="loading-txt">Finding cookie shops in Edinburgh…</span></div>}
            {errMsg&&!loading&&<div className="err-banner"><span style={{flex:1}}>⚠️ {errMsg}</span><button onClick={()=>{setLoaded(false);fetchLive();}} style={{background:"linear-gradient(135deg,var(--caramel),var(--golden))",color:"#fff",border:"none",borderRadius:"100px",padding:"6px 14px",fontSize:"12px",fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap",flexShrink:0}}>🔄 Retry</button></div>}
            <button className="surprise-btn" onClick={surpriseMe} title="Surprise me!">🎲</button>
            <button className="loc-btn" onClick={getLocation} title="Use my location">📍</button>
          </div>
        )}
        {view==='list'&&(
          <div className="list-view">
            <div className="ptr-hint" onClick={()=>{setLoaded(false);fetchLive();}}>
              {loading?<span className="ptr-spin">🔄</span>:<span>↓</span>}
              {loading?'Refreshing...':'Pull to refresh'}
            </div>
            {visible.length===0
              ?<div className="empty"><div className="empty-ico">🍪</div><div className="empty-ttl">No cookie shops found</div><div className="empty-txt">{filter==='favourites'?"You haven't saved any favourites yet. Tap ❤️ on any location!":"Try adjusting your search or filters."}</div></div>
              :visible.map(loc=><ListItem key={loc.id} loc={loc} userLoc={userLoc} favs={favs} onSelect={l=>{setSel(l);setView('map');}} onFav={toggleFav}/>)
            }
          </div>
        )}
        {sel&&<LocationSheet loc={sel} favs={favs} onFav={toggleFav} onClose={()=>setSel(null)}
          onShare={()=>{
            const txt=sel.name+' - '+sel.address;
            if(navigator.share){navigator.share({title:'Find My Cookie',text:txt,url:window.location.href});}
            else{navigator.clipboard.writeText(txt).then(()=>alert('Copied to clipboard!'));}
          }}
          onReport={()=>alert('Thanks for the report — we will review this location.')}
        />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
